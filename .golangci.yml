version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - gocognit
    - bodyclose
    - nilerr
    - errorlint
    - unparam
    - unconvert

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
    gocognit:
      min-complexity: 15
