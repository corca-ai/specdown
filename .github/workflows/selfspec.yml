name: Self-Spec

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selfspec:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '~1.24'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/specdown ./cmd/specdown/

      - name: Run self-spec
        run: |
          export PATH="$(pwd)/bin:$PATH"
          bin/specdown run

      - name: Prepare Pages artifact
        if: github.ref == 'refs/heads/main'
        run: |
          cp -r specs/report _site
          cp specs/report.json _site/report.json

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: selfspec
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
