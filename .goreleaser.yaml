version: 2

builds:
  - id: specdown
    main: ./cmd/specdown
    binary: specdown
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: specdown-adapter-shell
    main: ./cmd/specdown-adapter-shell
    binary: specdown-adapter-shell
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      specdown_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Breaking Changes
      regexp: '(?i)BREAKING'
      order: 0
    - title: Added
      regexp: '^Add '
      order: 1
    - title: Fixed
      regexp: '^Fix '
      order: 2
    - title: Changed
      regexp: '^(Replace|Simplify|Consolidate|Unify|Restructure|Use|Move|Rename|Refactor)'
      order: 3
    - title: Removed
      regexp: '^Remove '
      order: 4
    - title: Documentation
      regexp: '^(Improve|Rewrite) .*(spec|doc|guide|index|readme)'
      order: 5
    - title: Other
      order: 999
  filters:
    exclude:
      - '^Merge '

release:
  github:
    owner: corca-ai
    name: specdown

brews:
  - repository:
      owner: corca-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/corca-ai/specdown
    description: Executable specifications in Markdown
    license: MIT
    install: |
      bin.install "specdown"
      bin.install "specdown-adapter-shell"
    test: |
      system bin/"specdown", "version"
